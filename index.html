<!DOCTYPE html>
<html lang="en">
<head>
    <link
      rel="stylesheet"
      data-purpose="Layout StyleSheet"
      title="Web Awesome"
      href="/css/app-wa-3b124ff0e0d7a67cd8c995d0aeb1d15a.css?vsn=d"
    >
    <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.6.0/css/all.css">
    <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.6.0/css/sharp-duotone-solid.css">
    <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.6.0/css/sharp-thin.css">
    <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.6.0/css/sharp-solid.css">
    <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.6.0/css/sharp-regular.css">
    <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.6.0/css/sharp-light.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adhaan Scheduler Persistent Visual Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 20px;
            background-color: #f8f9fa;
        }
        .prayer-time-box {
            margin: 10px;
            padding: 25px 20px;
            border: 1px solid #ddd;
            border-radius: 12px;
            display: inline-block;
            min-width: 140px;
            text-align: center;
            background-color: white;
            transition: all 0.5s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .upcoming-highlight {
            border: 2px solid #28a745 !important;
            transform: scale(1.05);
            box-shadow: 0 8px 15px rgba(40, 167, 69, 0.2);
            background-color: #f4fff6;
        }
        .date-clock-container {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
        }
        .current-date {
            font-size: 16px;
            font-weight: bold;
            color: #495057;
        }
        .hijri-date {
            font-size: 14px;
            color: #6c757d;
            font-style: italic;
        }
        .live-clock {
            font-size: 24px;
            font-weight: bold;
            color: #212529;
            margin-top: 5px;
        }
        .scrollable-row {
            overflow-x: auto;
            white-space: nowrap;
            margin-top: 80px;
            padding: 15px 0;
        }
        .upcoming-timer {
            font-weight: bold;
            font-size: 15px;
            color: #6c757d;
            margin-top: 10px;
        }
        .upcoming-highlight .upcoming-timer {
            color: #28a745;
        }

        /* Persistent Full Screen Visual Alert Overlay */
        #visualAlertOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(40, 167, 69, 0.98);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        #visualAlertOverlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .alert-title {
            font-size: 4.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .alert-subtitle {
            font-size: 2.2rem;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .comment {
            color: black;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            margin-top: 60px;
            display: inline-block;
            font-size: 24px;
        }
        .color {
            color: red;
        }
    </style>
</head>
<body>
    <div id="visualAlertOverlay">
        <div class="alert-title">🕌 حی علی الصلاة</div>
        <div class="alert-subtitle" id="alertPrayerName">It's Time to Pray!</div>
        <button class="btn btn-light btn-lg px-5 py-3 fw-bold text-success shadow-lg rounded-pill" onclick="dismissVisualAlert()">Dismiss / Clear Alert</button>
    </div>

    <div class="text-start ms-4">
        <h1>Adhaan Scheduler</h1>
    </div>
    
    <div class="date-clock-container">
        <div class="current-date" id="currentDateDisplay"></div>
        <div class="hijri-date" id="hijriDateDisplay"></div>
        <div class="live-clock" id="liveClockDisplay">00:00:00 AM</div>
    </div>
    
    <div class="container">
        <div class="row justify-content-center scrollable-row">
            <div id="fajrBox" class="col prayer-time-box">
                <h2>Fajr الفجر</h2>
                <p id="fajrTime">-</p>
                <div class="upcoming-timer" id="fajrTimer">--:--:--</div>
            </div>
            <div id="dhuhrBox" class="col prayer-time-box">
                <h2>Dhuhr الظهر</h2>
                <p id="dhuhrTime">-</p>
                <div class="upcoming-timer" id="dhuhrTimer">--:--:--</div>
            </div>
            <div id="asrBox" class="col prayer-time-box">
                <h2>Asr العصر</h2>
                <p id="asrTime">-</p>
                <div class="upcoming-timer" id="asrTimer">--:--:--</div>
            </div>
            <div id="maghribBox" class="col prayer-time-box">
                <h2>Maghrib المغرب</h2>
                <p id="maghribTime">-</p>
                <div class="upcoming-timer" id="maghribTimer">--:--:--</div>
            </div>
            <div id="ishaBox" class="col prayer-time-box">
                <h2>Isha العشاء</h2>
                <p id="ishaTime">-</p>
                <div class="upcoming-timer" id="ishaTimer">--:--:--</div>
            </div>
        </div>

        <div class="mt-4">
            <button class="btn btn-outline-success btn-sm px-4" onclick="triggerVisualAlert('Dhuhr')">Test Match Alert Template</button>
        </div>
    </div>

    <script>
        const prayerSchedule = {
            "2026-07-16": { fajr: "04:31 AM", dhuhr: "12:58 PM", asr: "04:43 PM", maghrib: "08:03 PM", isha: "09:25 PM" },
            "2026-07-17": { fajr: "04:32 AM", dhuhr: "12:58 PM", asr: "04:43 PM", maghrib: "08:03 PM", isha: "09:24 PM" },
            "2026-07-18": { fajr: "04:33 AM", dhuhr: "12:58 PM", asr: "04:43 PM", maghrib: "08:02 PM", isha: "09:23 PM" },
            "2026-07-19": { fajr: "04:34 AM", dhuhr: "12:58 PM", asr: "04:43 PM", maghrib: "08:02 PM", isha: "09:22 PM" },
            "2026-07-20": { fajr: "04:35 AM", dhuhr: "12:59 PM", asr: "04:43 PM", maghrib: "08:01 PM", isha: "09:22 PM" },
            "2026-07-21": { fajr: "04:36 AM", dhuhr: "12:59 PM", asr: "04:43 PM", maghrib: "08:01 PM", isha: "09:21 PM" },
            "2026-07-22": { fajr: "04:37 AM", dhuhr: "12:59 PM", asr: "04:43 PM", maghrib: "08:00 PM", isha: "09:20 PM" },
            "2026-07-23": { fajr: "04:38 AM", dhuhr: "12:59 PM", asr: "04:43 PM", maghrib: "07:59 PM", isha: "09:19 PM" },
            "2026-07-24": { fajr: "04:38 AM", dhuhr: "12:59 PM", asr: "04:43 PM", maghrib: "07:59 PM", isha: "09:18 PM" },
            "2026-07-25": { fajr: "04:39 AM", dhuhr: "12:59 PM", asr: "04:43 PM", maghrib: "07:58 PM", isha: "09:17 PM" },
            "2026-07-26": { fajr: "04:40 AM", dhuhr: "12:59 PM", asr: "04:43 PM", maghrib: "07:57 PM", isha: "09:16 PM" },
            "2026-07-27": { fajr: "04:41 AM", dhuhr: "12:59 PM", asr: "04:43 PM", maghrib: "07:57 PM", isha: "09:15 PM" },
            "2026-07-28": { fajr: "04:42 AM", dhuhr: "12:59 PM", asr: "04:43 PM", maghrib: "07:56 PM", isha: "09:14 PM" },
            "2026-07-29": { fajr: "04:43 AM", dhuhr: "12:59 PM", asr: "04:43 PM", maghrib: "07:55 PM", isha: "09:13 PM" },
            "2026-07-30": { fajr: "04:44 AM", dhuhr: "12:59 PM", asr: "04:42 PM", maghrib: "07:54 PM", isha: "09:12 PM" },
            "2026-07-31": { fajr: "04:45 AM", dhuhr: "12:59 PM", asr: "04:42 PM", maghrib: "07:54 PM", isha: "09:11 PM" },
            "2026-08-01": { fajr: "04:46 AM", dhuhr: "12:58 PM", asr: "04:42 PM", maghrib: "07:53 PM", isha: "09:10 PM" },
            "2026-08-02": { fajr: "04:47 AM", dhuhr: "12:58 PM", asr: "04:42 PM", maghrib: "07:52 PM", isha: "09:09 PM" },
            "2026-08-03": { fajr: "04:48 AM", dhuhr: "12:58 PM", asr: "04:42 PM", maghrib: "07:51 PM", isha: "09:08 PM" },
            "2026-08-04": { fajr: "04:49 AM", dhuhr: "12:58 PM", asr: "04:41 PM", maghrib: "07:50 PM", isha: "09:07 PM" },
            "2026-08-05": { fajr: "04:50 AM", dhuhr: "12:58 PM", asr: "04:41 PM", maghrib: "07:49 PM", isha: "09:06 PM" },
            "2026-08-06": { fajr: "04:51 AM", dhuhr: "12:58 PM", asr: "04:41 PM", maghrib: "07:48 PM", isha: "09:04 PM" },
            "2026-08-07": { fajr: "04:52 AM", dhuhr: "12:58 PM", asr: "04:41 PM", maghrib: "07:47 PM", isha: "09:03 PM" },
            "2026-08-08": { fajr: "04:53 AM", dhuhr: "12:58 PM", asr: "04:40 PM", maghrib: "07:46 PM", isha: "09:02 PM" },
            "2026-08-09": { fajr: "04:54 AM", dhuhr: "12:58 PM", asr: "04:40 PM", maghrib: "07:45 PM", isha: "09:01 PM" },
            "2026-08-10": { fajr: "04:55 AM", dhuhr: "12:58 PM", asr: "04:40 PM", maghrib: "07:44 PM", isha: "08:59 PM" },
            "2026-08-11": { fajr: "04:56 AM", dhuhr: "12:57 PM", asr: "04:39 PM", maghrib: "07:43 PM", isha: "08:58 PM" },
            "2026-08-12": { fajr: "04:57 AM", dhuhr: "12:57 PM", asr: "04:39 PM", maghrib: "07:42 PM", isha: "08:57 PM" },
            "2026-08-13": { fajr: "04:58 AM", dhuhr: "12:57 PM", asr: "04:39 PM", maghrib: "07:41 PM", isha: "08:55 PM" },
            "2026-08-14": { fajr: "04:59 AM", dhuhr: "12:57 PM", asr: "04:38 PM", maghrib: "07:40 PM", isha: "08:54 PM" }
        };

        const prayersList = ["fajr", "dhuhr", "asr", "maghrib", "isha"];
        let triggeredPrayersThisMinute = {};

        function triggerVisualAlert(prayerName) {
            const overlay = document.getElementById("visualAlertOverlay");
            document.getElementById("alertPrayerName").innerText = `It's Time for ${prayerName.toUpperCase()}!`;
            overlay.classList.add("active");
        }

        function dismissVisualAlert() {
            const overlay = document.getElementById("visualAlertOverlay");
            overlay.classList.remove("active");
        }

        function startLiveClockAndTimers() {
            setInterval(() => {
                const now = new Date();
                const currentMinutesStr = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                // Update ticking clock display
                document.getElementById("liveClockDisplay").innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
                
                const todayStr = getCurrentDate();
                const todaySchedule = prayerSchedule[todayStr];

                if (todaySchedule) {
                    prayersList.forEach(p => {
                        document.getElementById(`${p}Time`).innerText = todaySchedule[p];
                    });

                    updateCountdownsAndHighlights(todaySchedule, now, currentMinutesStr);
                }
            }, 1000);
        }

        function updateCountdownsAndHighlights(schedule, now, currentMinutesStr) {
            let nextPrayerFound = false;

            prayersList.forEach(prayer => {
                const pBox = document.getElementById(`${prayer}Box`);
                const pTimer = document.getElementById(`${prayer}Timer`);
                
                const prayerTimeStr = schedule[prayer];
                const prayerDateTime = new Date(now.toDateString() + ' ' + prayerTimeStr);

                pBox.classList.remove("upcoming-highlight");
                const timeDiff = prayerDateTime - now;

                // Automated Visual Alert Trigger check on the exact minute boundary match
                const standardizedPrayerStr = prayerDateTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                if (currentMinutesStr === standardizedPrayerStr) {
                    if (!triggeredPrayersThisMinute[prayer]) {
                        triggeredPrayersThisMinute[prayer] = true;
                        triggerVisualAlert(prayer);
                    }
                }

                if (timeDiff > 0) {
                    const hours = Math.floor((timeDiff / (1000 * 60 * 60)) % 24);
                    const minutes = Math.floor((timeDiff / (1000 * 60)) % 60);
                    const seconds = Math.floor((timeDiff / 1000) % 60);
                    
                    pTimer.innerText = `In ${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

                    if (!nextPrayerFound) {
                        pBox.classList.add("upcoming-highlight");
                        nextPrayerFound = true;
                    }
                } else {
                    pTimer.innerText = "Passed";
                    // Reset day protection tracking lock safely once minute rolls completely away
                    if (timeDiff < -60000 && triggeredPrayersThisMinute[prayer]) {
                        delete triggeredPrayersThisMinute[prayer];
                    }
                }
            });

            if (!nextPrayerFound) {
                document.getElementById("fajrBox").classList.add("upcoming-highlight");
                document.getElementById("fajrTimer").innerText = "Next: Tomorrow Fajr";
            }
        }

        function getCurrentDate() {
            const currentDate = new Date();
            const year = currentDate.getFullYear();
            const month = String(currentDate.getMonth() + 1).padStart(2, '0');
            const day = String(currentDate.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function displayCurrentDate() {
            const currentDate = new Date();
            const year = currentDate.getFullYear();
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            const day = currentDate.getDate();
            const suffix = (day % 10 === 1 && day !== 11) ? 'st' :
                           (day % 10 === 2 && day !== 12) ? 'nd' :
                           (day % 10 === 3 && day !== 13) ? 'rd' : 'th';
            document.getElementById("currentDateDisplay").innerText = `${day}${suffix} ${monthNames[currentDate.getMonth()]} ${year}`;
            
            const hijriOption = { day: 'numeric', month: 'long', year: 'numeric' };
            const hijriDate = new Intl.DateTimeFormat('en-TN-u-ca-islamic', hijriOption).format(currentDate);
            document.getElementById("hijriDateDisplay").innerText = hijriDate;
        }

        function initialize() {
            displayCurrentDate();
            startLiveClockAndTimers();
        }

        window.onload = initialize;
    </script>
    <br>
    <span class="comment">Made with <span class="color"><i class="fa-solid fa-heart"></i></span> from United States </span>
</body>
</html>
